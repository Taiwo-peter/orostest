# ═══════════════════════════════════════════════════════════
# Oros Platform — CI/CD Pipeline (Frontend Application)
# Place in repo: .github/workflows/deploy.yml
#
# DEVOPS SETUP:
#   1. Change REGISTRY_OWNER to the GitHub username or org
#      that owns this repo (must be lowercase)
#   2. Add repo secrets: VPS_HOST, VPS_SSH_KEY
#   3. Ensure developer has a Dockerfile in their repo
#
# EXPECTED REPO STRUCTURE:
#   repo/
#   ├── .github/workflows/deploy.yml  ← This file
#   ├── Dockerfile
#   ├── nginx.conf                    ← Nginx config serving on port 3000
#   ├── package.json
#   ├── package-lock.json             ← Must be committed (run npm install)
#   ├── src/
#   │   ├── main.jsx
#   │   ├── App.jsx
#   │   └── __tests__/
#   │       └── App.test.jsx
#   ├── index.html
#   ├── vite.config.js
#   └── .gitignore
#
# NOTES:
#   - Frontend does not connect to database or Redis directly
#   - Frontend communicates with APIs through Nginx routes
#   - Keycloak integration happens in the browser via JavaScript
# ═══════════════════════════════════════════════════════════

name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE_NAME: frontend
  SERVICE_PORT: 3000
  REGISTRY_OWNER: taiwo-peter       # ← Change to GitHub username/org (MUST be lowercase)

jobs:
  # ── Gate 1: Test ──────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build check
        run: npm run build

  # ── Gate 2: Build & Push Image ────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REGISTRY_OWNER }}/oros-${{ env.SERVICE_NAME }}:latest
            ghcr.io/${{ env.REGISTRY_OWNER }}/oros-${{ env.SERVICE_NAME }}:${{ github.sha }}

  # ── Gate 3: Deploy to VM ──────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SERVICE_NAME,SERVICE_PORT,REGISTRY_OWNER
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/${REGISTRY_OWNER}/oros-${SERVICE_NAME}:latest

            docker stop oros-${SERVICE_NAME} 2>/dev/null || true
            docker rm oros-${SERVICE_NAME} 2>/dev/null || true

            docker run -d \
              --name oros-${SERVICE_NAME} \
              --network oros-net \
              --restart unless-stopped \
              -p ${SERVICE_PORT}:3000 \
              ghcr.io/${REGISTRY_OWNER}/oros-${SERVICE_NAME}:latest

            sleep 5
            curl -sf http://localhost:${SERVICE_PORT}/health && echo "Frontend deployed successfully" || echo "Health check failed"
