# ═══════════════════════════════════════════════════════════
# Oros Platform — CI/CD Pipeline (Frontend Application)
# Place in repo: .github/workflows/deploy.yml
#
# DEVOPS SETUP:
#   1. Add repo secrets: VPS_HOST, VPS_SSH_KEY
#   2. Ensure developer has a Dockerfile in their repo
#
# EXPECTED REPO STRUCTURE:
#   repo/
#   ├── Dockerfile
#   ├── package.json
#   ├── src/
#   └── public/
#
# EXPECTED DOCKERFILE (React example):
#   FROM node:20-alpine AS build
#   WORKDIR /app
#   COPY package*.json ./
#   RUN npm ci
#   COPY . .
#   RUN npm run build
#
#   FROM nginx:alpine
#   COPY --from=build /app/dist /usr/share/nginx/html
#   COPY nginx.conf /etc/nginx/conf.d/default.conf
#   EXPOSE 3000
#   CMD ["nginx", "-g", "daemon off;"]
# ═══════════════════════════════════════════════════════════

name: Build & Deploy Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SERVICE_NAME: frontend
  SERVICE_PORT: 3000

jobs:
  # ── Gate 1: Test & Build Check ────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint 2>/dev/null || echo "No lint script — consider adding one"

      - name: Run tests
        run: npm test -- --watchAll=false 2>/dev/null || echo "No tests found — add tests"

      - name: Build check
        run: npm run build

  # ── Gate 2: Build & Push Image ────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/oros-${{ env.SERVICE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/oros-${{ env.SERVICE_NAME }}:${{ github.sha }}

  # ── Gate 3: Deploy to VM ──────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: SERVICE_NAME,SERVICE_PORT
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker pull ghcr.io/${{ github.repository_owner }}/oros-${SERVICE_NAME}:latest

            docker stop oros-${SERVICE_NAME} 2>/dev/null || true
            docker rm oros-${SERVICE_NAME} 2>/dev/null || true

            docker run -d \
              --name oros-${SERVICE_NAME} \
              --network oros-net \
              --restart unless-stopped \
              -p ${SERVICE_PORT}:3000 \
              -e REACT_APP_API_URL=http://161.97.161.227 \
              -e REACT_APP_KEYCLOAK_URL=http://161.97.161.227:8080 \
              -e REACT_APP_KEYCLOAK_REALM=oros \
              -e REACT_APP_KEYCLOAK_CLIENT_ID=oros-web \
              ghcr.io/${{ github.repository_owner }}/oros-${SERVICE_NAME}:latest

            sleep 5
            curl -sf http://localhost:${SERVICE_PORT} && echo "Frontend deployed successfully" || echo "Health check failed"
